# Local development database for AutoMinutes.
# Every team member runs this the same way:  docker compose up -d
# No MongoDB auth is configured on purpose — this is a local dev container only.
services:
  mongo:
    image: mongo:7
    container_name: autominutes-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional web UI to browse the data at http://localhost:8081  (login: admin / admin)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: autominutes-mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data: